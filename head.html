<script>
document.addEventListener("DOMContentLoaded", function () {
  function rebuildSidebar() {
    var sidebar = document.querySelector(".quarto-listing-category");
    if (!sidebar) return;

    var allCats = sidebar.querySelectorAll(".category");
    var catTitle = sidebar.querySelector(".quarto-listing-category-title");
    var langCats = [];
    var regularCats = [];

    allCats.forEach(function (el) {
      var raw = decodeURIComponent(atob(el.getAttribute("data-category")));
      if (raw.startsWith("lang:")) {
        el.textContent = raw.replace("lang:", "");
        langCats.push(el);
      } else {
        regularCats.push(el);
      }
    });

    if (langCats.length === 0) return;

    sidebar.innerHTML = "";

    var langTitle = document.createElement("div");
    langTitle.className = "quarto-listing-category-language-title";
    langTitle.textContent = "Language";
    sidebar.appendChild(langTitle);
    langCats.forEach(function (el) { sidebar.appendChild(el); });

    var catLabel = document.createElement("div");
    catLabel.className = "quarto-listing-category-language-title";
    catLabel.textContent = "Categories";
    sidebar.appendChild(catLabel);
    regularCats.forEach(function (el) { sidebar.appendChild(el); });
  }

  setTimeout(rebuildSidebar, 100);
  setTimeout(rebuildSidebar, 500);
});
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {
  // Fix lang: pills on cards
  function fixLangPills() {
    document.querySelectorAll(".listing-category").forEach(function (el) {
      var text = el.textContent.trim();
      if (text.toUpperCase().startsWith("LANG:")) {
        el.textContent = text.replace(/^lang:/i, "");
        el.setAttribute("data-value", el.getAttribute("data-value") || text.toLowerCase());
        // Move to its own line
        var parent = el.parentElement;
        var wrapper = document.createElement("div");
        wrapper.className = "listing-lang-wrapper";
        parent.parentElement.insertBefore(wrapper, parent.nextSibling);
        wrapper.appendChild(el);
      }
    });
  }
  setTimeout(fixLangPills, 200);
  setTimeout(fixLangPills, 600);
});
</script>

<script>
/* Fix description mid-ellipsis: flatten <a><p> blocks to inline text */
(function () {
  function fixDescriptions() {
    document.querySelectorAll(
      ".quarto-listing-default .quarto-post .listing-description"
    ).forEach(function (desc) {
      var text = (desc.textContent || desc.innerText || "").trim().replace(/\s+/g, " ");
      desc.textContent = text;
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", fixDescriptions);
  } else {
    fixDescriptions();
  }
  /* re-run after quarto listing renders/filters */
  var orig = window["quarto-listing-loaded"];
  window["quarto-listing-loaded"] = function () {
    if (orig) orig();
    setTimeout(fixDescriptions, 50);
  };
})();
</script>
