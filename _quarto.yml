      <div class="qf-bio">
        <div class="qf-name">Farhan Aditya Ramadhan</div>
        <div class="qf-sub">Economics · Policy · Data</div>
        <div class="qf-text">Economics graduate from Universitas Indonesia. Research interests in historical economics, macroeconomics, political economy, and applied econometrics. Currently residing in Jakarta.</div>
      </div>
      <div class="qf-license">
        &copy; 2026 Farhan Aditya Ramadhan &middot;
        Code: <a href="https://github.com/farhanadityaramadhan/farhanadityaramadhan.github.io/blob/main/LICENSE" target="_blank">MIT</a> &middot;
        Content: <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>
      </div>
    center: |
      <div class="qf-links-title">Quick Links</div>
