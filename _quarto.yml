website:
  favicon: images/icons/randomfavicon.jpeg  # TODO: replace with final favicon
  title: "Farhan (Adin) Aditya Ramadhan"
  description: "Economics graduate from Universitas Indonesia specializing in macroeconomics and historical economics, using causal inference and applied econometrics, with Stata, R, and Python"
  site-url: "https://farhanadityaramadhan.github.io/"
  
  page-footer:
