        <li><a href="/index.html">Overview</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/webpages/projects/analysis.html">Analysis</a></li>
        <li><a href="/webpages/projects/research.html">Research</a></li>
        <li><a href="/webpages/projects/blog.html">Blog</a></li>
