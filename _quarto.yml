      <div class="qf-contact"><i class="bi bi-envelope-fill"></i> adin.ramaadin@gmail.com</div>
      <div class="qf-contact"><i class="bi bi-geo-alt-fill"></i> Grogol, DKI Jakarta</div>
      <div class="qf-socials">
        <a class="qf-social-btn" href="https://www.linkedin.com/in/adinramaadin/" target="_blank" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
        <a class="qf-social-btn" href="https://github.com/farhanadityaramadhan" target="_blank" aria-label="GitHub"><i class="bi bi-github"></i></a>
        <a class="qf-social-btn" href="mailto:adin.ramaadin@gmail.com" aria-label="Email"><i class="bi bi-envelope-fill"></i></a>
